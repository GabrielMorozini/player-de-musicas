<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="music-container">
        <h4 id="playlist-title" class="playlist-title">Playlist Morozini</h4>
        <img id='cover' class="cover" alt="Disc Cover.">
        <audio id='audio'></audio>
        <div id="below-cover" class="below-cover">
            <div id="song-info">
                <p id="song-name" class="song-name">Nome da música</p>
                <p id="band-name" class="light-color">Nome da banda</p>
            </div>
            <button id='like' class="button light-color"><i class="bi bi-heart"></i></button>
        </div>
        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar">
                <div id="current-progress" class="current-progress"></div>
            </div>
            <div id="time-box" class="time-box">
                <time id="song-time">00:00:00</time>
                <time id="total-time">00:00:00</time>
            </div>
        </div>
        <nav id="button-container" class="button-container">
            <button id="shuffle" class="button"><i class="bi bi-shuffle"></i></button>
            <button id="previous" class="button button-navigate"><i class="bi bi-skip-start-fill"></i></button>
            <button id="play" class="button button-biggest"><i class="bi bi-play-circle-fill"></i></button>
            <button id="next" class="button button-navigate"><i class="bi bi-skip-end-fill"></i></button>
            <button id="repeat" class="button"><i class="bi bi-repeat"></i></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>

</html>
